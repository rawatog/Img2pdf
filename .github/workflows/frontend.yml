name: Frontend Build & Push

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v4

      # 2. Define Git SHA tag
      - name: Set image tag
        run: echo "IMAGE_TAG=${GITHUB_SHA}" >> $GITHUB_ENV

      # 3. Docker login
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build & push image with SHA tag (IMPORTANT CHANGE)
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/i2pdf_frontend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/i2pdf_frontend:latest

      # 5. Update Kubernetes manifest (IMPORTANT NEW STEP)
      - name: Update K8s manifest image tag
        run: |
          sed -i "s|image: .*/i2pdf_frontend:.*|image: ${{ secrets.DOCKER_USERNAME }}/i2pdf_frontend:${GITHUB_SHA}|g" k8s/i2pdf_frontend_deployment.yaml

      # 6. Commit and push manifest change
      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/frontend-deployment.yaml
          git commit -m "Update frontend image to ${GITHUB_SHA}" || echo "No changes"
          git push
