name: Backend Build & Push

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build & push image with SHA tag (IMPORTANT CHANGE)
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/i2pdf_backend:${{ github.sha }}
            ${{ secrets.DOCKER_USERNAME }}/i2pdf_backend:latest

      # 5. Update Kubernetes manifest (IMPORTANT NEW STEP)
      - name: Update K8s manifest image tag
        run: |
          sed -i "s|image: .*/i2pdf_backend:.*|image: ${{ secrets.DOCKER_USERNAME }}/i2pdf_backend:${GITHUB_SHA}|g" k8s/i2pdf_backend_deployment.yaml

      # 6. Commit and push manifest change
      - name: Commit updated manifest
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/i2pdf_backend_deployment.yaml
          git commit -m "Update backend image to ${GITHUB_SHA}" || echo "No changes"
          git push
        
